<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pokemon Website</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffcb05, #3b4cca);
            text-align: center;
            color: white;
            padding: 20px;
        }

        .container {
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 15px;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            color: #ffcb05;
        }

        .pokemon {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .pokemon img {
            width: 150px;
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .pokemon img:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Hello! I'm Christian 👋</h1>

    <h2>About Me</h2>
    <p>
        Hi! My name is Christian S. Parreño. I am an Electronics Engineering student who loves technology,
        programming, and building cool electronics projects. I also enjoy Pokemon
        and adding fun designs to my websites.
    </p>
